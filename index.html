<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>word-game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>word-game</h1>
        
        <div class="score-board">
            <span>점수: <strong id="score">0</strong></span>
            <span>문제: <strong id="question-num">1</strong> / <strong id="total">10</strong></span>
        </div>

        <div class="game-area">
            <div class="sentence" id="sentence"></div>
            <div class="hint" id="hint"></div>
            
            <div class="inputs" id="inputs"></div>
            
            <button id="submit-btn" onclick="checkAnswer()">정답 확인</button>
            <button id="next-btn" onclick="nextQuestion()" style="display:none;">다음 문제</button>
            
            <div class="message" id="message"></div>
        </div>

        <div class="controls">
            <button onclick="startGame('preset')">기존 문제</button>
            <button onclick="startGame('random')">랜덤 문제</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
